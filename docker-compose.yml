services:
  marrow:
    build:
      context: .
      args:
        BUILD_TAGS: "sqlite_fts5 vps"
    restart: unless-stopped
    volumes:
      - ./data:/data
      - ./config.toml:/app/config.toml:ro
    environment:
      - MARROW_SERVER_DB=/data/marrow.db
      - MARROW_SERVER_LOG_FORMAT=json
      - MARROW_SERVER_SYNC_INTERVAL=15m
    # Expose only on localhost; Caddy handles external traffic
    ports:
      - "127.0.0.1:8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      marrow:
        condition: service_healthy

volumes:
  caddy_data:
  caddy_config:
