izer.</li> <li><strong class="text-white">documents_vec</strong> — a virtual sqlite-vec table storing 384-dimensional float vectors.</li></ul> <p>When you sync, Marrow parses Markdown with <code>goldmark</code>, extracts YAML frontmatter (title and lang), strips code blocks to reduce noise, and generates a SHA-256 content hash. Only files with new hashes are re-embedded and re-indexed.</p> <p>At search time, Marrow runs two independent queries—one against FTS5 (BM25 scoring) and one against sqlite-vec (cosine distance)—then merges the results with <strong class="text-white">Reciprocal Rank Fusion</strong> (RRF) using a 70/30 blend. Additional heuristics boost title matches, exact phrase matches, and recent documents.</p></div>`),_a=q(`<div class="px-6 pb-6 text-[#b0b0c0] text-sm leading-relaxed space-y-4"><p>Search is not a simple keyword lookup. Marrow applies several layers of ranking:</p> <ol class="list-decimal pl-5 space-y-2"><li><strong class="text-white">Stemming & language detection</strong> — Queries are stemmed using pure-Go Snowball stemmers (English Porter2, Spanish, Basque). If no language hint is provided, Marrow auto-detects it from character patterns (e.g., ñ/¿/¡ for Spanish, tx/tz for Basque) and stopword frequencies.</li> <li><strong class="text-white">Dual retrieval</strong> — FTS5 returns BM25-ranked results; sqlite-vec returns cosine-similarity-ranked results. Both are limited to <code>limit × 3</code> candidates.</li> <li><strong class="text-white">RRF fusion</strong> — Each candidate gets a fused score: <code>70% FTS + 30% vector</code>, blending normalized rank positions and raw similarity scores.</li> <li><strong class="text-white">Title boost</strong> — If stemmed query tokens appear in the document title, the score is multiplied by up to <code>1.25×</code>.</li> <li><strong class="text-white">Exact phrase boost</strong> — Quoted phrases and title substring matches each give an extra <code>1.10×</code> multiplier.</li> <li><strong class="text-white">Recency boost</strong> — Documents modified within the last 180 days receive up to <code>1.05×</code>; older docs trend toward <code>1.0×</code>.</li></ol> <p>You can filter results by <code>source</code>, <code>doc_type</code> (markdown, issue, pull_request), or <code>lang</code> via the API or the UI below.</p></div>`),va=q(`<div class="px-6 pb-6 text-[#b0b0c0] text-sm leading-relaxed space-y-4"><p>Marrow supports three source types, each with incremental sync behavior:</p> <ul class="list-disc pl-5 space-y-2"><li><strong class="text-white">Local directories</strong> — The watcher crawls the tree and uses <code>mtime</code> as a fast-path filter. If <code>mtime</code> hasn't changed since the last sync, the file is skipped. Otherwise, the file is read and its SHA-256 hash is compared to the stored hash. Deleted files are removed from the DB automatically.</li> <li><strong class="text-white">Git repositories</strong> — <code>gitpull.Sync</code> clones with <code>--depth 1</code> on first run, then fetches and hard-resets on subsequent runs. Only <code>.md</code> files that changed between the old and new HEAD are re-indexed.</li> <li><strong class="text-white">GitHub API (Issues & PRs)</strong> — Fetches open issues and pull requests, including comments. Each item gets a synthetic path like <code>gh:owner/repo/issues/123</code>. Webhooks keep the index live: opened/edited/reopened events re-index; closed events delete.</li></ul> <p>Run <code>marrow sync</code> for a one-off sync, or use <code>marrow reindex</code> to force a full re-index across all configured sources.</p></div>`),ya=q(`<div class="px-6 pb-6 text-[#b0b0c0] text-sm leading-relaxed space-y-4"><p>Marrow abstracts embeddings behind a simple <code>Func</code> interface. Three providers are supported:</p> <ul class="list-disc pl-5 space-y-2"><li><strong class="text-white">mock</strong> (default) — Deterministic 384-dim vectors generated from the SHA-256 hash of the text via Box-Muller normal distribution. Zero-config, fully offline, and reproducible across runs. Great for CI and testing.</li> <li><strong class="text-white">ollama</strong> — Talks to a local Ollama server (default <code>http://localhost:11434</code>, model <code>nomic-embed-text</code>). Fully local, no API keys.</li> <li><strong class="text-white">openai</strong> — Talks to any OpenAI-compatible API (default <code>text-embedding-3-small</code>). Requires an <code>api_key</code>; optionally override <code>base_url</code> for proxies or Azure.</li></ul> <p>Configure the provider in your config file or via environment variables: <code>MARROW_EMBEDDING_PROVIDER=ollama</code>, <code>MARROW_EMBEDDING_MODEL=...</code>, <code>MARROW_EMBEDDING_BASE_URL=...</code>, <code>MARROW_EMBEDDING_API_KEY=...</code>.</p></div>`),ba=q(`<div class="px-6 pb-6 text-[#b0b0c0] text-sm leading-relaxed space-y-4"><p>Marrow uses a four-layer configuration cascade (later layers override earlier ones):</p> <ol class="list-decimal pl-5 space-y-1"><li>Hardcoded defaults</li> <li>User config: <code class="text-white">~/.config/marrow/config.toml</code></li> <li>Project config: <code class="text-white">.marrow.toml</code> (discovered by walking up from the working directory)</li> <li>Environment variables with the <code class="text-white">MARROW_</code> prefix</li></ol> <p>Example <code>.marrow.toml</code>:</p> <pre class="bg-black/40 border border-white/5 rounded-lg p-4 font-mono text-xs text-[#a0a0b0] overflow-x-auto">[server]

local_path = "./repo/wiki"</pre> <p>With multiple sources configured, <code>marrow sync --all</code> and <code>marrow serve</code> will index each source automatically.</p></div>`),xa=q(`<div class="px-6 pb-6 text-[#b0b0c0] text-sm leading-relaxed space-y-4"><ul class="space-y-3"><li><code class="text-white bg-white/10 px-1.5 py-0.5 rounded">marrow sync</code> <p class="mt-1">One-off incremental sync of a local directory. Flags: <code>-dir</code>, <code>-db</code>, <code>-source</code>, <code>-default-lang</code>. Use <code>-all</code> to sync every configured source.</p></li> <li><code class="text-white bg-white/10 px-1.5 py-0.5 rounded">marrow serve</code> <p class="mt-1">Starts the HTTP API and serves this landing page. Flags include <code>-db</code>, <code>-addr</code>, <code>-detect-lang</code>, <code>-default-lang</code>, plus GitHub/GitHub App options for live repo/issue sync.</p></li> <li><code class="text-white bg-white/10 px-1.5 py-0.5 rounded">marrow status</code> <p class="mt-1">Prints database stats: total docs, size, last sync, breakdown by source and doc type.</p></li> <li><code class="text-white bg-white/10 px-1.5 py-0.5 rounded">marrow reindex</code> <p class="mt-1">Force a full reindex of all configured sources. Useful after schema changes or large refactors.</p></li> <li><code class="text-white bg-white/10 px-1.5 py-0.5 rounded">marrow maintain</code> <p class="mt-1">Runs VACUUM and prunes orphaned FTS/vector rows. Use <code>-backup</code> to create a timestamped backup first.</p></li></ul></div>`),Sa=q(`<div class="px-6 pb-6 text-[#b0b0c0] text-sm leading-relaxed space-y-4"><div class="space-y-3"><div><div class="font-mono text-xs text-[#ff4d6d] mb-1">POST /search</div> <pre class="bg-black/40 border border-white/5 rounded-lg p-3 font-mono text-xs text-[#a0a0b0] overflow-x-auto"></pre> <p class="mt-1">Returns ranked results with <code>id</code>, <code>path</code>, <code>title</code>, <code>doc_type</code>, and <code>score</code>.</p></div> <div><
